repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      # - id: no-commit-to-branch
      #   args: [--branch, main]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-r, src/, -c, pyproject.toml]
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-ia-attrib
        name: block AI attribution in commit messages
        entry: scripts/check_ia_attrib.sh
        language: script
        stages: [commit-msg]

      - id: ruff-check
        name: ruff check (no fixes)
        entry: bash -c 'uv run ruff check src/ tests/'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Backend: tests on pre-push
      - id: pytest
        name: pytest
        entry: bash -c 'uv run pytest'
        language: system
        pass_filenames: false
        stages: [pre-push]
