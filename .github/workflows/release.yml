name: Release

on:
  push:
    branches: [main]

jobs:
  bump:
    # Evitar loop infinito: el commit de bump no relanza este workflow
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # commitizen necesita el histórico completo desde el último tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: cz
        run: |
          if cz bump --yes; then
            VERSION=$(cz version --project)
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true"        >> "$GITHUB_OUTPUT"
          else
            EXIT_CODE=$?
            # Exit 21 = NO_COMMITS_FOUND: no hay commits fix/feat desde el último tag
            if [ "$EXIT_CODE" -eq 21 ]; then
              echo "bumped=false" >> "$GITHUB_OUTPUT"
              echo "No bumpable commits since last tag — skipping release."
            else
              exit "$EXIT_CODE"
            fi
          fi

      - name: Push bump commit and tag
        if: steps.cz.outputs.bumped == 'true'
        run: |
          git push
          git push origin "refs/tags/v${{ steps.cz.outputs.version }}"
